  <rect x="35" y="30" width="30" height="40" rx="2" fill="white" opacity="0.9"/>
  <rect x="40" y="35" width="20" height="3" rx="1" fill="#D4A853"/>
  <rect x="40" y="42" width="20" height="2" rx="1" fill="#D4A853"/>
  <rect x="40" y="47" width="20" height="2" rx="1" fill="#D4A853"/>
  <rect x="40" y="52" width="15" height="2" rx="1" fill="#D4A853"/>
  <rect x="40" y="57" width="18" height="2" rx="1" fill="#D4A853"/>
  
  <!-- Small triangle for document corner fold -->
  <path d="M65 30 L75 40 L65 40 Z" fill="#D4A853" opacity="0.8"/>
</svg>